# HERE AND NOW AI - AI is Good
spring.application.name=mcp-client
spring.ai.ollama.chat.model=gpt-oss:20b
spring.ai.mcp.client.sse.connections.pdf-server.url=http://localhost:8081
spring.main.web-application-type=none
spring.ai.mcp.client.request-timeout=120s
spring.ai.ollama.init.timeout=120s

# Performance optimizations for M4 Pro Max
spring.ai.ollama.chat.options.temperature=0.7
spring.ai.ollama.chat.options.num-ctx=8192
spring.ai.ollama.chat.options.num-predict=2048
spring.ai.ollama.chat.options.num-gpu=1
spring.ai.ollama.chat.options.num-thread=12
spring.ai.ollama.chat.options.repeat-penalty=1.1
spring.ai.ollama.chat.options.top-k=40
spring.ai.ollama.chat.options.top-p=0.9
